name: Mobile-Build

on:
  push:
    branches:
      - master
    tags:
      - 'Files and Outputs'
  # workflow_dispatch: # Cho phép bấm chạy thủ công

jobs:
  # --- JOB BUILD ANDROID ---
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate Files & Delete Conflicting Outputs
        run: dart run build_runner build -d --delete-conflicting-outputs

      - name: Decrypt Key
        shell: bash
        env:
          ENCRYPTION_KEY: ${{ secrets.ENV_DECRYPT_KEY }}
        run: bash script/prepare.sh decrypt <<< "$ENCRYPTION_KEY"

      - name: Clean and Fetch Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        # Build release để không cần cấu hình keystore
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # --- JOB BUILD IOS (UNSIGNED) ---
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate Files & Delete Conflicting Outputs
        run: dart run build_runner build -d --delete-conflicting-outputs

      - name: Decrypt Key
        shell: bash
        env:
          ENCRYPTION_KEY: ${{ secrets.ENV_DECRYPT_KEY }}
        run: bash script/prepare.sh decrypt <<< "$ENCRYPTION_KEY"

      - name: Clean and Fetch Dependencies
        run: |
          flutter pub get
          cd ios && pod install && cd ..

      - name: Build iOS Frameworks
        # Chỉ build ra cấu trúc app, không thực hiện ký danh
        run: flutter build ios --release --no-codesign

      - name: Package "Fake" IPA
        # Đây là cách cậu đã làm, dùng để lưu trữ hoặc cài máy Jailbreak
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Flutter-Unsigned.ipa Payload

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: release.ipa

  # --- JOB ĐẨY FILE VÀO RELEASES ---
  create-release:
    name: Deploy to GitHub Release
    needs: [build-android, build-ios] # Chờ cả 2 job build xong thành công
    runs-on: ubuntu-latest
    permissions:
      contents: write # Quyền tối quan trọng để ghi dữ liệu vào Release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Tải file APK đã build từ job trước xuống
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: ./download-apk

      # Tải file IPA đã build từ job trước xuống
      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: ./download-ios

      # Xem thử cấu trúc thư mục để debug nếu cần (Có thể xóa bước này sau)
      - name: Display structure of downloaded files
        run: ls -R

      # # Đổi lại tên file trong thư mục artifacts cho rõ ràng (tùy chọn)
      # - name: Rename artifacts for release
      #   run: |
      #     mv ./artifacts/app-release.apk ./artifacts/app-release.apk
      #     mv ./artifacts/Flutter-Unsigned.ipa ./artifacts/ios-unsigned-ipa.ipa
      #     ls -R ./artifacts

      # Tạo/Cập nhật GitHub Release và đính kèm file
      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Nếu chạy bằng Push Tag (v1.0), nó sẽ lấy luôn tag đó. 
          # Nếu chạy bằng master/thủ công, nó sẽ tự tạo tag dạng 'latest-master'
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-build' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Automated Build' }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/app-release.apk
            ./artifacts/ios-unsigned-ipa.ipa