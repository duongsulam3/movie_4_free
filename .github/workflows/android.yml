name: Android-apk-build

on: push:
  branches:
    - production

jobs:
  build-android:
    name: 🎉 Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
      - run: flutter pub get
      - run: pod repo update
        working-directory: ios

      - run: flutter build android --release

      - run: mkdir Payload
        working-directory: build/app/outputs/flutter-apk

      - run: mv app-release.apk Payload
        working-directory: build/app/outputs/flutter-apk

      - name: Zip output
        run: zip -qq -r -9 FlutterApkExport.apk Payload
        working-directory: build/app/outputs/flutter-apk

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/app/outputs/flutter-apk/FlutterApkExport.apk
          tag: v1.0
          overwrite: true
          body: "This is first release"