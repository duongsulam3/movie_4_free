group 'com.custom.simpleflix'
version '1.0-SNAPSHOT'

buildscript {
    ext.kotlin_version = '1.9.20' // Phiên bản Kotlin tiêu chuẩn đảm bảo độ ổn định
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        // Sử dụng Android Gradle Plugin tương thích cao
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.custom.simpleflix'
    compileSdkVersion rootProject.hasProperty('compileSdkVersion') ? rootProject.compileSdkVersion : 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        // Ép mức tối thiểu là 21 (Android 5.0) để hỗ trợ các hàm đồ họa và luồng video mượt mà
        minSdkVersion rootProject.hasProperty('minSdkVersion') ? rootProject.minSdkVersion : 21
        targetSdkVersion rootProject.hasProperty('targetSdkVersion') ? rootProject.targetSdkVersion : 34
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    dependencies {
        // Chỉ nhúng các thư viện Core Core để giữ Plugin siêu nhẹ
        implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    }
}